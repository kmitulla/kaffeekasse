<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6b273"/>
      <stop offset="0.45" stop-color="#c96f4a"/>
      <stop offset="1" stop-color="#5a2e3f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.34"/>
    </linearGradient>
    <linearGradient id="coffee" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a4526"/>
      <stop offset="1" stop-color="#3c1f12"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe9a8"/>
      <stop offset="1" stop-color="#f0a848"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Dampf -->
  <g stroke="#ffffff" stroke-opacity="0.75" stroke-width="17" stroke-linecap="round" fill="none">
    <path d="M205 128 c-14-22 14-38 0-60"/>
    <path d="M262 118 c-14-24 16-42 0-66"/>
  </g>

  <!-- Henkel -->
  <path d="M352 216 h28 a52 52 0 0 1 0 104 h-28" fill="none"
        stroke="#ffffff" stroke-opacity="0.55" stroke-width="24"/>

  <!-- Glas-Tasse -->
  <path d="M120 176 h240 a16 16 0 0 1 16 16 v118 a86 86 0 0 1 -86 86 h-100 a86 86 0 0 1 -86 -86 v-118 a16 16 0 0 1 16 -16 z"
        fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.75" stroke-width="8"/>
  <!-- Kaffee -->
  <path d="M136 206 h208 v100 a64 64 0 0 1 -64 64 h-80 a64 64 0 0 1 -64 -64 z" fill="url(#coffee)" opacity="0.9"/>
  <!-- Glanz -->
  <path d="M150 196 v130 a70 70 0 0 0 22 51" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="12" stroke-linecap="round"/>

  <!-- Untersetzer -->
  <rect x="140" y="416" width="200" height="22" rx="11" fill="#ffffff" opacity="0.4"/>

  <!-- Euro-Münze -->
  <circle cx="376" cy="392" r="78" fill="url(#coin)" stroke="#ffffff" stroke-opacity="0.85" stroke-width="8"/>
  <circle cx="376" cy="392" r="60" fill="none" stroke="#a8641f" stroke-opacity="0.45" stroke-width="5"/>
  <text x="376" y="424" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="92" font-weight="800" fill="#7a4210" text-anchor="middle">€</text>
</svg>
